<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תמלול אוטומטי בעברית ויצירת כתוביות לסרטונים | QuickScribe</title>
    <meta name="description" content="QuickScribe מאפשר תמלול אוטומטי בעברית ויצירת כתוביות SRT לסרטונים ואודיו. העלו קובץ וקבלו תמלול מדויק תוך דקות.">
    <link rel="alternate" hreflang="he" href="{{ request.url_root.rstrip('/') }}/?lang=he">
    <link rel="alternate" hreflang="en" href="{{ request.url_root.rstrip('/') }}/?lang=en">
    <link rel="alternate" hreflang="x-default" href="{{ request.url_root.rstrip('/') }}/">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app_custom.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/app_logic.js') }}"></script>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>

<body style="display:flex; flex-direction:column; height:100vh; min-height:0;">

    <header class="navbar">
        <div class="lang-switcher-wrap" id="lang-switcher-wrap">
            <div class="lang-switcher-trigger" id="lang-switcher-trigger" title="Language">
                <svg class="lang-globe" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span class="lang-initials" id="lang-initials">He</span>
            </div>
            <div class="lang-switcher-menu" id="lang-switcher-menu">
                <button type="button" class="lang-option" data-lang="he">עברית</button>
                <button type="button" class="lang-option" data-lang="en">English</button>
            </div>
            <a href="/legal" class="nav-legal-link" data-i18n="footer_legal">תנאים ומדיניות</a>
        </div>
        <div class="hamburger-menu" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <a href="/" class="nav-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="QuickScribe" style="height: 60px; width: auto;">
        </a>

        <div class="nav-menu" id="nav-menu">
            <a href="/about" class="nav-item" data-i18n="nav_about">About Us</a>
            <a href="/blog" class="nav-item" data-i18n="nav_blog">Blog</a>
            <a href="/contact" class="nav-item" data-i18n="nav_contact">Contact</a>
            <a href="/personal" class="nav-item nav-personal-link" id="nav-personal-link" style="display: none;" data-i18n="nav_personal">איזור אישי</a>
            <a href="#" class="nav-item" id="nav-auth-btn" style="color: #5d5dff; font-weight: 800;" data-i18n="nav_sign_in">Sign In</a>
        </div>
    </header>

    <div id="user-menu-panel" class="user-menu-panel" aria-hidden="true">
        <div class="user-menu-header">
            <span class="user-menu-title" data-i18n="profile">Profile</span>
            <button type="button" id="user-menu-close" class="user-menu-close-btn" aria-label="Close">×</button>
        </div>
        <div id="user-menu-profile" class="user-menu-profile">
            <label class="user-menu-profile-label" for="user-menu-name" data-i18n="display_name">Display name</label>
            <input type="text" id="user-menu-name" class="user-menu-profile-input" placeholder="" autocomplete="name">
            <label class="user-menu-profile-label" for="user-menu-email" data-i18n="email">Email</label>
            <input type="email" id="user-menu-email" class="user-menu-profile-input" placeholder="" autocomplete="email">
            <p class="user-menu-profile-note" data-i18n="email_change_note">Changing email will send a confirmation link to the new address.</p>
            <p id="user-menu-profile-message" class="user-menu-profile-message" style="display: none;"></p>
            <div class="user-menu-profile-actions">
                <button type="button" id="user-menu-cancel" class="user-menu-cancel-btn" data-i18n="cancel">Cancel</button>
                <button type="button" id="user-menu-save" class="user-menu-save-btn" data-i18n="save">Save</button>
            </div>
            <div class="user-menu-profile-erase">
                <button type="button" id="user-menu-erase-account" class="user-menu-erase-btn" data-i18n="erase_account">Erase account</button>
            </div>
        </div>
    </div>

    <main class="main-content" style="flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;">
        {% block content %}{% endblock %}
    </main>

    <script>
        const socket = io({
            transports: ['websocket'],
            upgrade: false,
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 2000,
            reconnectionDelayMax: 10000
        });
        let socketWarned = false;
        socket.on('connect_error', () => {
            if (!socketWarned) {
                socketWarned = true;
                console.warn('QuickScribe: WebSocket unavailable. Start the app with Socket.IO (e.g. python siteapp.py) for live job updates.');
            }
        });
    </script>
    <script>
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
            document.querySelector('.hamburger-menu').classList.toggle('open');
        }
        (function() {
            var locale = localStorage.getItem('locale') || 'he';
            document.documentElement.lang = locale === 'he' ? 'he' : 'en';
            document.documentElement.dir = locale === 'he' ? 'rtl' : 'ltr';
            var initials = document.getElementById('lang-initials');
            if (initials) initials.textContent = locale === 'he' ? 'He' : 'En';
            var wrap = document.getElementById('lang-switcher-wrap');
            var menu = document.getElementById('lang-switcher-menu');
            var trigger = document.getElementById('lang-switcher-trigger');
            function closeLangMenu() { if (menu) menu.classList.remove('open'); }
            function openLangMenu() { if (menu) menu.classList.toggle('open'); }
            if (trigger && menu) {
                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    openLangMenu();
                });
            }
            document.querySelectorAll('.lang-option').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var code = this.getAttribute('data-lang');
                    if (window.setLocale) window.setLocale(code);
                    closeLangMenu();
                });
            });
            document.addEventListener('click', function() { closeLangMenu(); });
            if (wrap) wrap.addEventListener('click', function(e) { e.stopPropagation(); });
            document.addEventListener('DOMContentLoaded', function() {
                var loc = localStorage.getItem('locale') || 'he';
                window.currentLocale = loc;
                document.documentElement.lang = loc === 'he' ? 'he' : 'en';
                document.documentElement.dir = loc === 'he' ? 'rtl' : 'ltr';
                if (typeof window.applyTranslations === 'function') window.applyTranslations();
                setTimeout(function() { if (typeof window.applyTranslations === 'function') window.applyTranslations(); }, 0);
            });
        })();
    </script>


</body>
</html>
