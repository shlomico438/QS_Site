{% extends "base.html" %}

{% block content %}
<div class="content-page personal-area-page">
    <div class="personal-area-header-row">
        <h1>My Recordings</h1>
        <a id="personal-close-btn" class="personal-close-btn" href="/" data-i18n="personal_close_window">סגור וחזור לתמלול</a>
    </div>
    <p id="personal-guest-msg" style="display: none; color: #6b7280;" data-i18n="personal_guest">התחבר כדי לראות את הקבצים שלך.</p>

    <div id="personal-library-wrap" class="personal-library-wrap" style="display: none;">
        <div class="personal-search-wrap">
            <input
                id="personal-search-input"
                class="personal-search-input"
                type="search"
                placeholder="🔍 Search recordings..."
                aria-label="Search recordings"
            >
        </div>
        <p id="personal-empty-msg" class="personal-empty-msg" style="display: none;">No recordings available. Upload recordings from the main screen.</p>
        <div id="personal-recordings-list" class="personal-recordings-list" role="list"></div>
    </div>
</div>
{% endblock %}
