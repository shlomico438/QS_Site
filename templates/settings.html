{% extends "base.html" %}

{% block content %}
<div class="content-page">
    <h1>Settings</h1>
    <p id="settings-guest-msg" style="display: none; color: #6b7280;">Sign in to update your name and email.</p>
    <div id="settings-form-wrap" style="display: none;">
        <form id="settings-form" style="max-width: 420px;">
            <div style="margin-bottom: 20px;">
                <label for="settings-name" style="display: block; font-weight: 600; margin-bottom: 8px; color: #374151;">Display name</label>
                <input type="text" id="settings-name" name="name" placeholder="Your name" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="settings-email" style="display: block; font-weight: 600; margin-bottom: 8px; color: #374151;">Email</label>
                <input type="email" id="settings-email" name="email" placeholder="your@email.com" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem;">
                <p style="font-size: 0.8rem; color: #6b7280; margin-top: 6px;">Changing email will send a confirmation link to the new address.</p>
            </div>
            <div id="settings-message" style="margin-bottom: 16px; min-height: 24px; font-size: 0.9rem;"></div>
            <button type="submit" id="settings-save" style="padding: 12px 24px; background: #1e3a8a; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Save changes</button>
        </form>
    </div>
</div>
{% endblock %}
